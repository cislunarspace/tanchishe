name: CI

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: 检查代码质量
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Bevy 图形依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libasound2-dev \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

  build-release:
    name: 构建 ${{ matrix.os }}
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: tanchishe-windows.zip
          - os: ubuntu-latest
            artifact: tanchishe-ubuntu.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Bevy 图形依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libasound2-dev \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: 构建 release
        run: cargo build --release

      - name: 打包（Windows）
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/release
          7z a ../../tanchishe-windows.zip tanchishe.exe ../../assets

      - name: 打包（Ubuntu）
        if: runner.os == 'Linux'
        run: |
          cd target/release
          tar czf ../../tanchishe-ubuntu.tar.gz tanchishe ../../assets

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: 发布 GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
